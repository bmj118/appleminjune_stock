<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 3분기 — 사과민준</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --border: #e2ddd6;
    --text-primary: #1a1814; --text-secondary: #5a544a; --text-muted: #9a9088;
    --accent: #2d5a3d; --accent-light: #eef4f0; --accent-mid: #4a8c62;
    --update: #b85c00; --update-bg: #fef3e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text-primary); line-height: 1.8; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,245,240,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px;
  }
  .back-btn { font-size: 13px; color: var(--accent); text-decoration: none; padding: 4px 12px; border: 1px solid #c5deca; border-radius: 20px; transition: background 0.15s; }
  .back-btn:hover { background: var(--accent-light); }
  .header-title { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 600; color: var(--accent); }

  .container { max-width: 720px; margin: 0 auto; padding: 3rem 2rem 4rem; }

  .hero { margin-bottom: 3rem; opacity: 0; transform: translateY(20px); transition: opacity 0.6s, transform 0.6s; }
  .hero.visible { opacity: 1; transform: translateY(0); }
  .hero-tag { display: inline-block; font-size: 11px; color: var(--accent); background: var(--accent-light); border: 1px solid #c5deca; border-radius: 20px; padding: 3px 12px; margin-bottom: 0.75rem; }
  .hero h1 { font-family: 'Noto Serif KR', serif; font-size: 28px; font-weight: 600; line-height: 1.4; margin-bottom: 0.5rem; }
  .hero-meta { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

  .update-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--update); background: var(--update-bg); border: 1px solid #f0c090; border-radius: 20px; padding: 2px 10px; }
  .update-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--update); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

  .section { margin-bottom: 3.5rem; opacity: 0; transform: translateY(20px); transition: opacity 0.6s, transform 0.6s; }
  .section.visible { opacity: 1; transform: translateY(0); }
  .section-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 2px solid var(--accent); }
  .section-title { font-family: 'Noto Serif KR', serif; font-size: 20px; font-weight: 600; flex: 1; }

  /* 종목 그리드 */
  .stock-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 2rem;
  }
  .stock-btn {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 1rem 0.75rem;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
  }
  .stock-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(45,90,61,0.1);
    border-color: #c5deca;
  }
  .stock-btn.has-content {
    border-color: var(--accent-mid);
    background: var(--accent-light);
  }
  .stock-btn.has-content:hover {
    box-shadow: 0 4px 16px rgba(45,90,61,0.15);
  }
  .stock-btn.empty {
    opacity: 0.5;
    cursor: default;
  }
  .stock-btn.empty:hover {
    transform: none; box-shadow: none; border-color: var(--border);
  }
  .stock-name { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .stock-btn.empty .stock-name { color: var(--text-muted); }
  .stock-tag { font-size: 10px; color: var(--accent); background: white; border: 1px solid #c5deca; border-radius: 10px; padding: 1px 7px; }
  .stock-btn.empty .stock-tag { color: var(--text-muted); background: transparent; border-color: var(--border); }

  /* 종목 상세 카드 */
  .stock-detail { display: none; }
  .stock-detail.active { display: block; }

  .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 1.25rem; }
  .post-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
  .post-ticker { font-family: 'Noto Serif KR', serif; font-size: 17px; font-weight: 600; }
  .post-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .post-date { font-size: 11px; color: var(--text-muted); }
  .post-images { padding: 1rem 1.5rem; display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
  .post-images.two-col { grid-template-columns: 1fr 1fr; }
  .img-label { font-size: 11px; color: var(--text-muted); margin-bottom: 0.3rem; }
  .post-images img { width: 100%; border-radius: 6px; border: 1px solid var(--border); display: block; }
  .post-body { padding: 1.25rem 1.5rem; font-size: 15px; color: var(--text-secondary); line-height: 1.9; border-top: 1px solid var(--border); }
  .post-body strong { color: var(--text-primary); font-weight: 500; }

  .close-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-muted);
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px; cursor: pointer;
    margin-bottom: 1rem; transition: background 0.15s;
  }
  .close-btn:hover { background: var(--border); }

  .placeholder { padding: 2rem 1.5rem; text-align: center; color: var(--text-muted); font-size: 13px; }

  footer { text-align: center; padding: 2rem; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 2rem; }

  @media (max-width: 480px) {
    .stock-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="index.html">← 목록으로</a>
  <span class="header-title">2026 3분기 🍎</span>
  <span style="width:80px;"></span>
</header>

<div class="container">

  <div class="hero">
    <div class="hero-tag">2026 3분기 · 종목 분석</div>
    <h1>종목 뉴스 & 분석</h1>
    <p class="hero-meta">2026년 3분기 눈여겨보는 종목들을 정리합니다. &nbsp;<span class="update-tag"><span class="update-dot"></span>주기적 업데이트</span></p>
  </div>

  <!-- 민준픽 -->
  <div class="section">
    <div class="section-header">
      <h2 class="section-title">민준픽</h2>
      <span class="update-tag"><span class="update-dot"></span>업데이트 중</span>
    </div>

    <div class="stock-grid">
      <a class="stock-btn has-content" href="hyundai.html">
        <span class="stock-name">현대자동차</span>
        <span class="stock-tag">분석 완료</span>
      </a>
      <div class="stock-btn empty">
        <span class="stock-name">종목 2</span>
        <span class="stock-tag">작성 예정</span>
      </div>
      <div class="stock-btn empty">
        <span class="stock-name">종목 3</span>
        <span class="stock-tag">작성 예정</span>
      </div>
      <div class="stock-btn empty">
        <span class="stock-name">종목 4</span>
        <span class="stock-tag">작성 예정</span>
      </div>
      <div class="stock-btn empty">
        <span class="stock-name">종목 5</span>
        <span class="stock-tag">작성 예정</span>
      </div>
      <div class="stock-btn empty">
        <span class="stock-name">종목 6</span>
        <span class="stock-tag">작성 예정</span>
      </div>
      <div class="stock-btn empty">
        <span class="stock-name">종목 7</span>
        <span class="stock-tag">작성 예정</span>
      </div>
      <div class="stock-btn empty">
        <span class="stock-name">종목 8</span>
        <span class="stock-tag">작성 예정</span>
      </div>
      <div class="stock-btn empty">
        <span class="stock-name">종목 9</span>
        <span class="stock-tag">작성 예정</span>
      </div>
    </div>
  </div>

  <!-- 뉴스 분석 -->
  <div class="section">
    <div class="section-header">
      <h2 class="section-title">뉴스 분석</h2>
      <span class="update-tag"><span class="update-dot"></span>업데이트 예정</span>
    </div>
    <div class="post-card"><div class="placeholder">작성 예정</div></div>
  </div>

</div>

<footer>© 2026 사과민준 — 개인 학습 목적의 기록입니다. 투자 권유가 아닙니다.</footer>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
  }, { threshold: 0.06 });
  document.querySelectorAll('.hero, .section').forEach(el => observer.observe(el));
</script>
</body>
</html>
